<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map OS Ultra - Professional Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --surface-elevated: #1e1e1e;
            --accent: #bb86fc;
            --accent-dim: rgba(187, 134, 252, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ff4d4d;
            --safe: #03dac6;
            --glass: rgba(18, 18, 18, 0.8);
            --blur: saturate(180%) blur(12px);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text-primary); 
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }
        
        #map-container { position: relative; height: 100vh; width: 100%; background: #eee; }
        #map { height: 100%; width: 100%; }
        
        .leaflet-layer { filter: none !important; }

        .leaflet-popup-content-wrapper {
            background: #ffffff !important;
            color: #000000 !important;
            border-radius: 18px !important;
            padding: 0 !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid #ddd;
        }
        .leaflet-popup-tip { background: #ffffff !important; border: 1px solid #ddd; }
        .leaflet-popup-content { margin: 0 !important; width: 220px !important; }

        .map-pop-card { padding: 12px; color: #1a1a1a; }
        .map-pop-img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; margin: 8px 0; background: #eee; border: 1px solid #ddd; }
        .map-pop-path { font-size: 9px; color: #777; text-transform: uppercase; font-family: 'JetBrains Mono'; font-weight: bold; }
        .map-pop-name { font-weight: 800; color: #000; font-size: 15px; margin-top: 2px; }
        .map-pop-note { font-size: 11px; color: #444; line-height: 1.4; margin: 6px 0; border-left: 3px solid var(--accent); padding-left: 8px; font-style: normal; }
        .map-pop-dt { font-size: 10px; color: #888; border-top: 1px solid #eee; padding-top: 6px; margin-top: 8px; font-family: 'JetBrains Mono'; }
        .map-pop-btn { width: 100%; background: #1a1a1a; color: #fff; border: none; padding: 10px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 11px; text-transform: uppercase; }

        #map-title-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; width: 90%; max-width: 450px;
        }
        #map-title-bar input {
            width: 100%; background: var(--glass); color: var(--accent);
            border: 1px solid var(--border); border-radius: 14px; padding: 12px 20px;
            text-align: center; font-weight: 600; backdrop-filter: var(--blur);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); font-size: 14px;
            letter-spacing: 1px; text-transform: uppercase;
        }

        .center-dot {
            position: absolute; top: 50%; left: 50%;
            width: 16px; height: 16px; border: 3px solid var(--accent); 
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 50%; margin: -8px 0 0 -8px; 
            z-index: 2000; cursor: pointer; transition: all 0.3s;
            background: white;
        }

        .map-btn {
            position: absolute; z-index: 1000;
            background: var(--glass); color: var(--text-primary); border: 1px solid var(--border);
            border-radius: 16px; width: 50px; height: 50px; cursor: pointer; 
            backdrop-filter: var(--blur); font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #locate-btn { right: 20px; bottom: 90px; }
        #folder-btn { right: 20px; bottom: 30px; border-color: var(--accent); color: var(--accent); }

        .full-popup {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: var(--bg);
            z-index: 3000; overflow-y: auto; padding: 20px; box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }

        #context-menu {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 6000; justify-content: center; align-items: flex-end;
            padding-bottom: 20px;
        }
        .context-content {
            background: var(--surface-elevated); width: 95%; max-width: 400px; border-radius: 24px;
            padding: 10px; border: 1px solid var(--border);
        }
        .context-item { 
            padding: 18px; cursor: pointer; text-align: center; font-weight: 500; 
            border-radius: 16px; margin: 4px; transition: 0.2s;
        }
        .context-item:active { background: var(--accent-dim); color: var(--accent); }

        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-secondary); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; }
        
        input, select, textarea, .folder-trigger, .search-box { 
            width: 100%; padding: 16px; background: var(--surface-elevated); 
            border: 1px solid var(--border); border-radius: 14px; 
            color: var(--text-primary); font-size: 15px; box-sizing: border-box; outline: none;
        }

        .search-box { 
            margin-bottom: 20px; border-radius: 25px; padding-left: 45px; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%23888" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>'); 
            background-repeat: no-repeat; background-position: 18px center; 
        }

        .item-row { 
            background: var(--surface); margin-bottom: 12px; border-radius: 18px;
            display: flex; flex-direction: column; gap: 8px; padding: 16px; 
            border: 1px solid var(--border); position: relative;
        }
        .tile-header { display: flex; justify-content: space-between; align-items: flex-start; padding-right: 90px; }
        .tile-body { display: flex; gap: 12px; margin-top: 8px; align-items: center; }
        .tile-thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #000; border: 1px solid var(--border); }
        .tile-comment-preview { font-size: 12px; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .tile-name { font-weight: 700; color: var(--text-primary); font-size: 16px; }
        .tile-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        
        .tile-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 8px; }
        .action-circle { 
            width: 38px; height: 38px; border-radius: 50%; background: var(--surface-elevated); 
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);
            cursor: pointer; font-size: 14px;
        }
        .action-circle.active { color: var(--accent); border-color: var(--accent-dim); }

        .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
        .photo-slot { position: relative; width: 100%; aspect-ratio: 1; background: #000; border-radius: 12px; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }

        .btn-main { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        .floating-action {
            position: fixed; width: 65px; height: 65px; border-radius: 20px;
            color: #000; border: none; font-size: 28px; z-index: 3500; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #nav-back-float { bottom: 70px; right: 30px; background: var(--surface-elevated); background-color: grey; color: white; border: 1px solid var(--border); display: none; }
        #master-add-btn { bottom: 30px; left: 30px; background: var(--accent); }
        #log-save-float { bottom: 110px; right: 30px; background: var(--accent); display: none; }

        .marker-pin-wrapper { position: relative; width: 34px; height: 34px; transform: rotate(-45deg); border-radius: 50% 50% 50% 0; background: green; border: 2px solid green; box-shadow: 6px 5px 7px rgba(0,0,0,0.3); }
        .marker-pin-icon { transform: rotate(45deg); display: flex; align-items: center; justify-content: center; height: 100%; font-size: 16px; }

        .close-btn { position: fixed; bottom: 30px; right:30px; float: right; background: var(--surface-elevated); background-color: grey; border: 1px solid var(--border); color: red; width: 60px; height: 60px; border-radius: 30%; font-size: 30px; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .viewer-gallery { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 20px; scroll-snap-type: x mandatory; }
        .viewer-gallery img { width: 85%; height: 350px; object-fit: cover; border-radius: 24px; scroll-snap-align: center; flex-shrink: 0; }
        .nav-breadcrumb-header { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 13px; margin: 20px 0; }
        .io-bar { position: absolute; top: 25px; left: 20px; display: flex; gap: 10px; }
        .io-btn { background: var(--surface-elevated); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 10px; font-weight: 700; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map-title-bar"><input type="text" placeholder="MAP SESSION TITLE" id="user-map-title" onchange="updateMapTitle()"></div>
        <div id="map"></div>
        <div id="target-dot" class="center-dot" onclick="openLogForm()"></div>
    </div>

    <button id="locate-btn" class="map-btn">🎯</button>
    <button id="folder-btn" class="map-btn" onclick="openNav()">Ξ</button>

    <div id="context-menu" onclick="closeContextMenu()">
        <div class="context-content" onclick="event.stopPropagation()">
            <h3 id="context-item-name" style="text-align:center; margin: 15px 0; color:var(--text-secondary); font-size: 12px; text-transform: uppercase;">Options</h3>
            <div id="context-options"></div>
            <div class="context-item" style="background: var(--surface); color: #888;" onclick="closeContextMenu()">CANCEL</div>
        </div>
    </div>

    <div id="nav-screen" class="full-popup">
        <div class="io-bar">
            <button class="io-btn" onclick="exportData()">EXPORT</button>
            <button class="io-btn" onclick="importData()">IMPORT</button>
        </div>
        <button class="close-btn" onclick="exitNav()">✕</button>
        <h2 style="margin-top:50px; font-weight:300;">Data <strong style="color:var(--accent)">Archives</strong></h2>
        
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="io-btn" style="flex:1" onclick="toggleAllMarkers(true)">SHOW ALL</button>
            <button class="io-btn" style="flex:1" onclick="toggleAllMarkers(false)">HIDE ALL</button>
        </div>

        <input type="text" id="storage-search" class="search-box" placeholder="Search by name, notes, date..." oninput="triggerSearch()">
        <div id="nav-title-path" class="nav-breadcrumb-header">/</div>
        
        <div id="clipboard-notif" class="item-row" style="border-color: var(--accent); color: var(--accent); text-align: center; display:none;" onclick="pasteFromClipboard()">
            TAP TO DEPLOY CLIPBOARD (<span id="clipboard-count">0</span> ITEMS)
        </div>

        <div id="nav-list"></div>
        
        <button id="nav-back-float" class="floating-action" onclick="goBackNav()">⇗</button>
        <button id="master-add-btn" class="floating-action" onclick="createFolder()">+</button>
        <button id="picker-back" class="btn-main" style="display:none; position:fixed; bottom:35px; left:50%; transform:translateX(-50%); width:50%; z-index:4000" onclick="returnToEntry()">CONFIRM PATH</button>
    </div>

    <div id="log-form" class="full-popup">
        <button class="close-btn" style="float:left;" onclick="closePop()">←</button>
        <h2 style="text-align:right; font-weight:300;" id="form-title">ENTRY <strong style="color:var(--accent)">LOG</strong></h2>
        <input type="hidden" id="inp-id">
        <div class="form-group"><label>Reference Coordinates</label><input type="text" id="inp-coords" style="font-family:'JetBrains Mono'"></div>
        <div class="form-group"><label>Storage Directory</label><div class="folder-trigger" style="padding:16px; background:var(--surface-elevated); border:1px dashed var(--accent); color:var(--accent); border-radius:14px;" id="active-folder-display" onclick="openPicker()">/ </div></div>
        <div class="form-group"><label>Classification</label>
            <select id="inp-type">
                <option value="location">📍 General Location</option>
                <option value="restaurant">🍴 Restaurant</option>
                <option value="hotel">🏨 Hotel</option>
                <option value="temple">⛩️ Temple</option>
            </select>
        </div>
        <div style="display:flex; gap:15px;">
            <div class="form-group" style="flex:1"><label>Timeline Date</label><input type="date" id="inp-date"></div>
            <div class="form-group" style="flex:1"><label>Time</label><input type="time" id="inp-time"></div>
        </div>
        <div class="form-group">
            <label>Visual Evidence</label>
            <input type="file" id="inp-file" accept="image/*" style="display:none">
            <button class="btn-main" style="background:var(--surface-elevated); color:var(--accent); border:1px solid var(--accent-dim);" onclick="document.getElementById('inp-file').click()">APPEND MEDIA</button>
            <div id="crop-area" style="display:none; background:var(--surface); margin:20px 0; border-radius:20px; overflow:hidden; border: 1px solid var(--accent);">
                <div style="height:300px;"><img id="crop-img" style="max-width:100%"></div>
                <button class="btn-main" style="border-radius:0;" onclick="confirmCrop()">PROCESS IMAGE</button>
            </div>
            <div id="photo-preview-grid" class="photo-grid"></div>
        </div>
        <div class="form-group"><label>Entity Designation</label><input type="text" id="inp-name" placeholder="Name the location..."></div>
        <div class="form-group"><label>Field Notes</label><textarea id="inp-comm" rows="4" placeholder="Additional observations..."></textarea></div>
        <button id="log-save-float" class="floating-action" onclick="saveEntry()">✓</button>
    </div>

    <div id="tile-viewer" class="full-popup" style="z-index:5000; padding:0;">
        <div style="padding:20px;">
            <button class="close-btn" onclick="closePop()">✕</button>
            <h2 id="view-name" style="margin-top:40px; margin-bottom:5px;"></h2>
            <div id="view-dt" style="font-family:'JetBrains Mono'; font-size:11px; color:var(--accent); margin-bottom:20px;"></div>
            <div id="viewer-gallery" class="viewer-gallery"></div>
            <div style="background:var(--surface); padding:24px; border-radius:24px; border:1px solid var(--border);">
                <label>Observations</label>
                <div id="view-comm" style="line-height:1.6; color:var(--text-secondary); white-space: pre-wrap;"></div>
            </div>
            <div style="margin-top:20px; padding:10px; font-family:'JetBrains Mono'; font-size:10px; color:#555;">
                LOC_COORDS: <span id="view-coords" style="color:var(--text-secondary)"></span>
            </div>
            <div style="display:flex; gap:12px; margin-top:30px;">
                <button class="btn-main" style="background:var(--surface-elevated); color:white; flex:1;" onclick="closePop(); openNav();">ARCHIVE</button>
                <button class="btn-main" style="flex:1;" id="viewer-edit-btn">MODIFY</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        let dbState = JSON.parse(localStorage.getItem('map_db_pro') || '{"title":"Map OS Pro","lastPath":"root","items":[{"id":"root","name":"Root","parentId":null,"type":"folder"}]}');
        let db = dbState.items;
        document.getElementById('user-map-title').value = dbState.title;

        const map = L.map('map', { zoomControl: false, closePopupOnClick: false, tap: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let mapMarkers = {}; 
        let currentNavId = dbState.lastPath || "root";
        let targetFolderId = dbState.lastPath || "root";
        let isPickerMode = false;
        let clipboard = [];
        let cropper;
        let userMarker;
        let tempPhotos = []; 

        // UPDATED: Save DB now triggers a silent download
        function saveDB() {
            dbState.items = db;
            dbState.lastPath = currentNavId;
            localStorage.setItem('map_db_pro', JSON.stringify(dbState));
            silentExport();
        }

        // Silent export function for automatic backups
        function silentExport() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dbState));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `map_auto_backup_${Date.now()}.json`);
            dl.style.display = 'none';
            document.body.appendChild(dl);
            dl.click();
            document.body.removeChild(dl);
        }

        function updateMapTitle() {
            dbState.title = document.getElementById('user-map-title').value;
            saveDB();
        }

        function triggerSearch() { renderNav(currentNavId); }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dbState));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `map_manual_backup_${Date.now()}.json`);
            dl.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const content = JSON.parse(ev.target.result);
                    if(content.items) { 
                        dbState = content; 
                        db = dbState.items; 
                        currentNavId = dbState.lastPath || "root";
                        saveDB(); 
                        location.reload(); 
                    }
                }
                reader.readAsText(e.target.files[0]);
            }
            input.click();
        }

        map.on('locationfound', function(e) {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker(e.latlng, { radius: 10, color: '#bb86fc', fillOpacity: 1, weight: 4, fillColor: '#fff' }).addTo(map);
            map.setView(e.latlng, 16);
        });
        
        map.on('locationerror', function(e) {
        // Create an OS style notification banner
        const errorToast = document.createElement('div');
        errorToast.style.cssText = `
        position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
        background: rgba(255, 77, 77, 0.9); color: white; padding: 12px 24px;
        border-radius: 12px; font-weight: 600; z-index: 9999; font-size: 13px;
        box-shadow: 0 8px 32px rgba(255,0,0,0.2); backdrop-filter: blur(8px);
        font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.5px;
        `;
        errorToast.innerText = `⚠️ SYSTEM ERR: LOCATION UNAVAILABLE`;
        document.body.appendChild(errorToast);
        
        // Auto-remove after 4 seconds
        setTimeout(() => errorToast.remove(), 4000);
        
        // Reset map view smoothly
        map.setView([20, 0], 3);
        });
        
        
        document.getElementById('locate-btn').onclick = () => map.locate({setView: true, maxZoom: 16});

        function showContextMenu(item) {
            const menu = document.getElementById('context-menu');
            const options = document.getElementById('context-options');
            document.getElementById('context-item-name').innerText = item.name;
            options.innerHTML = "";
            
            const addOption = (label, fn, danger=false) => {
                const d = document.createElement('div');
                d.className = "context-item" + (danger ? " danger" : "");
                d.innerText = label;
                d.onclick = () => { fn(); closeContextMenu(); };
                options.appendChild(d);
            };

            if(item.type === 'tile') {
                addOption("VIEW ON MAP", () => focusOnMap(item.coords, item.id));
                addOption("EDIT LOG", () => editTile(item));
            }
            
            addOption("CUT TO CLIPBOARD", () => {
                if(!clipboard.some(x => x.id === item.id)) clipboard.push(item);
                document.getElementById('clipboard-notif').style.display = 'block';
                document.getElementById('clipboard-count').innerText = clipboard.length;
                db = db.filter(x => x.id !== item.id);
                saveDB(); renderNav(currentNavId); refreshMapMarkers();
            });

            addOption("RENAME", () => {
                const n = prompt("New Identifier:", item.name);
                if(n) { item.name = n; saveDB(); renderNav(currentNavId); refreshMapMarkers(); }
            });

            addOption("DELETE", () => {
                if(confirm("Permanently delete?")) {
                    db = db.filter(x => x.id !== item.id);
                    saveDB(); renderNav(currentNavId); refreshMapMarkers();
                }
            }, true);
            menu.style.display = 'flex';
        }

        function closeContextMenu() { document.getElementById('context-menu').style.display = 'none'; }

        function pasteFromClipboard() {
            clipboard.forEach(item => { item.parentId = currentNavId; db.push(item); });
            clipboard = []; document.getElementById('clipboard-notif').style.display = 'none';
            saveDB(); renderNav(currentNavId); refreshMapMarkers();
        }

        function editTile(item) {
            closePop();
            openLogForm();
            document.getElementById('form-title').innerHTML = "EDIT <strong style='color:var(--accent)'>LOG</strong>";
            document.getElementById('inp-id').value = item.id;
            document.getElementById('inp-coords').value = item.coords;
            document.getElementById('inp-name').value = item.name;
            document.getElementById('inp-comm').value = item.comments || "";
            document.getElementById('inp-type').value = item.placeType;
            document.getElementById('inp-date').value = item.date;
            document.getElementById('inp-time').value = item.time_raw || "";
            targetFolderId = item.parentId;
            document.getElementById('active-folder-display').innerText = getFullPath(targetFolderId);
            tempPhotos = item.imgs ? [...item.imgs] : [];
            renderPhotoGrid();
        }

        function renderPhotoGrid() {
            const grid = document.getElementById('photo-preview-grid');
            grid.innerHTML = "";
            tempPhotos.forEach((src, idx) => {
                const div = document.createElement('div');
                div.className = "photo-slot";
                div.innerHTML = `<img src="${src}"><button style="position:absolute; top:4px; right:4px; background:red; color:white; border:none; border-radius:4px;" onclick="tempPhotos.splice(${idx},1); renderPhotoGrid()">✕</button>`;
                grid.appendChild(div);
            });
        }

        document.getElementById('inp-file').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = document.getElementById('crop-img');
                img.src = ev.target.result;
                document.getElementById('crop-area').style.display = 'block';
                if(cropper) cropper.destroy();
                cropper = new Cropper(img, { aspectRatio: NaN, viewMode: 1, autoCropArea: 1 });
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function confirmCrop() {
            const data = cropper.getCroppedCanvas({width: 1000}).toDataURL('image/jpeg', 0.8);
            tempPhotos.push(data);
            document.getElementById('crop-area').style.display = 'none';
            renderPhotoGrid();
        }

        function refreshMapMarkers() {
            Object.values(mapMarkers).forEach(m => map.removeLayer(m));
            mapMarkers = {};
            
            const typeIcons = {
                'location': '📍',
                'restaurant': '🍴',
                'hotel': '🏨',
                'temple': '⛩️'
            };

            db.filter(i => i.type === 'tile' && i.visible !== false).forEach(tile => {
                const coords = tile.coords.split(',').map(Number);
                const displayIcon = typeIcons[tile.placeType] || '📍';

                const marker = L.marker(coords, { 
                    icon: L.divIcon({ 
                        html: `<div class="marker-pin-wrapper"><div class="marker-pin-icon">${displayIcon}</div></div>`, 
                        className: '', iconSize: [34, 34], iconAnchor: [17, 34] 
                    })
                }).addTo(map);

                const pathStr = getFullPath(tile.parentId);
                const firstImg = (tile.imgs && tile.imgs.length > 0) ? `<img src="${tile.imgs[0]}" class="map-pop-img">` : '';
                const commentStr = tile.comments ? `<div class="map-pop-note">${tile.comments}</div>` : '';

                marker.bindPopup(`
                    <div class="map-pop-card">
                        <div class="map-pop-path">${pathStr}</div>
                        <div class="map-pop-name">${tile.name}</div>
                        ${firstImg}
                        ${commentStr}
                        <div class="map-pop-dt">${tile.date} @ ${tile.time}</div>
                        <button class="map-pop-btn" onclick="jumpToStorage('${tile.id}')">Exploration Record</button>
                    </div>`);
                mapMarkers[tile.id] = marker;
            });
        }

        function openNav() { 
            isPickerMode = false; document.getElementById('nav-screen').style.display = 'block'; 
            document.getElementById('picker-back').style.display = 'none'; renderNav(currentNavId); 
        }

        function jumpToStorage(tid) { 
            closePop(); const item = db.find(x => x.id === tid); 
            if(item) { currentNavId = item.parentId; openNav(); viewTile(item); } 
        }

        function focusOnMap(coordsStr, itemId) {
            closePop();
            const coords = coordsStr.split(',').map(Number);
            map.setView(coords, 16);
            setTimeout(() => { if (mapMarkers[itemId]) mapMarkers[itemId].openPopup(); }, 400);
        }

        function openPicker() { 
            isPickerMode = true; document.getElementById('nav-screen').style.display = 'block'; 
            document.getElementById('picker-back').style.display = 'block'; document.getElementById('log-form').style.display = 'none';
            renderNav(currentNavId);
        }

        function exitNav() { if(isPickerMode) returnToEntry(); else closePop(); }
        function returnToEntry() {
            targetFolderId = currentNavId;
            document.getElementById('active-folder-display').innerText = getFullPath(targetFolderId);
            document.getElementById('nav-screen').style.display = 'none'; document.getElementById('log-form').style.display = 'block';
        }

        function getFullPath(id) {
            let path = []; let curr = db.find(x => x.id === id);
            while(curr && curr.id !== "root") { path.unshift(curr.name); curr = db.find(x => x.id === curr.parentId); }
            return "/ " + path.join(' / ');
        }

        function renderNav(pid) {
            currentNavId = pid;
            const list = document.getElementById('nav-list');
            const sTerm = document.getElementById('storage-search').value.toLowerCase();
            list.innerHTML = "";
            document.getElementById('nav-title-path').innerText = sTerm ? "FILTER RESULTS" : getFullPath(pid);
            document.getElementById('nav-back-float').style.display = (pid === "root" || sTerm) ? "none" : "flex";

            let items;
            if(sTerm) {
                items = db.filter(i => 
                    i.id !== 'root' && (
                        (i.name && i.name.toLowerCase().includes(sTerm)) ||
                        (i.comments && i.comments.toLowerCase().includes(sTerm)) ||
                        (i.date && i.date.includes(sTerm)) ||
                        (i.placeType && i.placeType.toLowerCase().includes(sTerm))
                    )
                );
            } else {
                items = db.filter(x => x.parentId === pid);
            }

            items.sort((a,b) => a.type === 'folder' ? -1 : 1).forEach(i => {
                const d = document.createElement('div');
                d.className = "item-row";
                const isVis = i.visible !== false;
                d.onclick = () => { if(i.type === 'folder') renderNav(i.id); else viewTile(i); };

                let subInfo = "";
                let bodyContent = "";

                if(i.type === 'folder') {
                    const children = db.filter(x => x.parentId === i.id);
                    subInfo = `<div class="tile-sub">${children.filter(x => x.type === 'folder').length} Folders | ${children.filter(x => x.type === 'tile').length} Files</div>`;
                } else {
                    subInfo = `<div class="tile-sub">${i.date} @ ${i.time}</div>`;
                    const thumb = (i.imgs && i.imgs.length > 0) ? `<img src="${i.imgs[0]}" class="tile-thumb">` : `<div class="tile-thumb" style="display:flex; align-items:center; justify-content:center; font-size:10px; color:#333;">NO IMG</div>`;
                    const comment = i.comments ? `<div class="tile-comment-preview">${i.comments}</div>` : `<div class="tile-comment-preview" style="opacity:0.3">No field notes...</div>`;
                    bodyContent = `<div class="tile-body">${thumb}${comment}</div>`;
                }

                d.innerHTML = `
                    <div class="tile-header">
                        <div><span class="tile-name">${i.type === 'folder' ? '📁' : ''} ${i.name}</span>${subInfo}</div>
                    </div>
                    ${bodyContent}
                    <div class="tile-actions">
                        <div class="action-circle ${isVis?'active':''}" onclick="event.stopPropagation(); toggleVis('${i.id}')">${isVis?'👁️':'hidden'}</div>
                        <div class="action-circle" onclick="event.stopPropagation(); showContextMenu(${JSON.stringify(i).replace(/"/g, '&quot;')})">•••</div>
                    </div>
                `;
                list.appendChild(d);
            });
        }

        function toggleVis(id) {
            const item = db.find(x => x.id === id);
            const newState = !(item.visible !== false);
            const apply = (obj, s) => {
                obj.visible = s;
                db.filter(c => c.parentId === obj.id).forEach(c => apply(c, s));
            };
            apply(item, newState);
            saveDB(); refreshMapMarkers(); renderNav(currentNavId);
        }

        function toggleAllMarkers(show) { 
            db.forEach(i => i.visible = show); 
            saveDB(); refreshMapMarkers(); renderNav(currentNavId); 
        }

        function openLogForm() {
            document.getElementById('form-title').innerHTML = "NEW <strong style='color:var(--accent)'>LOG</strong>";
            document.getElementById('inp-id').value = "";
            document.getElementById('inp-date').valueAsDate = new Date();
            const now = new Date();
            document.getElementById('inp-time').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const center = map.getCenter();
            document.getElementById('inp-coords').value = center.lat.toFixed(6) + ", " + center.lng.toFixed(6);
            document.getElementById('inp-name').value = "";
            document.getElementById('inp-comm').value = "";
            
            targetFolderId = currentNavId; 
            document.getElementById('active-folder-display').innerText = getFullPath(targetFolderId);
            
            tempPhotos = []; renderPhotoGrid();
            document.getElementById('log-form').style.display = 'block';
            document.getElementById('log-save-float').style.display = 'flex';
        }

        function viewTile(i) {
            document.getElementById('view-name').innerText = i.name;
            document.getElementById('view-coords').innerText = i.coords;
            document.getElementById('view-dt').innerText = `TIMESTAMP: ${i.date} @ ${i.time}`;
            document.getElementById('view-comm').innerText = i.comments || "No field notes.";
            const gallery = document.getElementById('viewer-gallery');
            gallery.innerHTML = "";
            (i.imgs || []).forEach(src => {
                const img = document.createElement('img'); img.src = src; gallery.appendChild(img);
            });
            document.getElementById('viewer-edit-btn').onclick = () => editTile(i);
            document.getElementById('tile-viewer').style.display = 'block';
        }

        function saveEntry() {
            const id = document.getElementById('inp-id').value;
            const rawTime = document.getElementById('inp-time').value;
            const [h, m] = rawTime.split(':');
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;

            const entry = {
                placeType: document.getElementById('inp-type').value,
                name: document.getElementById('inp-name').value || "UNNAMED",
                date: document.getElementById('inp-date').value,
                time: `${h12}:${m} ${ampm}`,
                time_raw: rawTime,
                coords: document.getElementById('inp-coords').value,
                comments: document.getElementById('inp-comm').value,
                parentId: targetFolderId,
                imgs: [...tempPhotos],
                visible: true
            };
            if(id) {
                let idx = db.findIndex(x => x.id === id);
                if(idx !== -1) Object.assign(db[idx], entry);
            } else {
                db.push({ id: "t"+Date.now(), type: 'tile', ...entry });
            }
            saveDB(); refreshMapMarkers(); closePop(); openNav();
        }

        function createFolder() {
            const n = prompt("FOLDER NAME:");
            if(n) { db.push({ id: "f"+Date.now(), name: n, parentId: currentNavId, type: 'folder', visible: true }); saveDB(); renderNav(currentNavId); }
        }

        function closePop() { 
            document.querySelectorAll('.full-popup').forEach(p => p.style.display = 'none'); 
            document.getElementById('log-save-float').style.display = 'none';
        }
        function goBackNav() { const c = db.find(x => x.id === currentNavId); if(c) renderNav(c.parentId); }

        window.onload = () => {
            refreshMapMarkers();
            map.locate({setView: true, maxZoom: 16});
        };
    </script>
</body>
</html>
